<section class="value section" id="value" #valueSection>
  <div class="container">
    <div class="value__header">
      <span class="section-tag reveal">{{ 'VALUE.TAG' | translate }}</span>
      <h2 class="section-title reveal">{{ 'VALUE.TITLE' | translate }}</h2>
    </div>

    <div class="value__cards">
      <!-- Card 1: Digital Agility -->
      <div class="value__card glass-card reveal">
        <div class="value__card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
        </div>
        <h3 class="value__card-title">{{ 'VALUE.CARD1_TITLE' | translate }}</h3>
        <p class="value__card-desc">{{ 'VALUE.CARD1_DESC' | translate }}</p>
        <div class="value__card-line"></div>
      </div>

      <!-- Card 2: Turnkey Solutions -->
      <div class="value__card glass-card reveal">
        <div class="value__card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
          </svg>
        </div>
        <h3 class="value__card-title">{{ 'VALUE.CARD2_TITLE' | translate }}</h3>
        <p class="value__card-desc">{{ 'VALUE.CARD2_DESC' | translate }}</p>
        <div class="value__card-line"></div>
      </div>

      <!-- Card 3: 360° Vision -->
      <div class="value__card glass-card reveal">
        <div class="value__card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="6"></circle>
            <circle cx="12" cy="12" r="2"></circle>
          </svg>
        </div>
        <h3 class="value__card-title">{{ 'VALUE.CARD3_TITLE' | translate }}</h3>
        <p class="value__card-desc">{{ 'VALUE.CARD3_DESC' | translate }}</p>
        <div class="value__card-line"></div>
      </div>
    </div>
  </div>
</section>
